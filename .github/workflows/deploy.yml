name: Validate And Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            addon/package-lock.json
            scraper/package-lock.json

      - name: Install addon dependencies
        working-directory: addon
        run: npm ci

      - name: Test addon
        working-directory: addon
        run: npm test

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

  deploy:
    name: deploy
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: [self-hosted, raspberry-pi, production]
    environment: production
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify production runner
        run: |
          set -euo pipefail

          test "${RUNNER_ENVIRONMENT:-}" = "self-hosted"
          command -v rsync
          docker compose version

      - name: Sync repository to local deploy path
        env:
          DEPLOY_PATH: /home/peterdsp/magnetio
        run: |
          set -euo pipefail

          if [ "$DEPLOY_PATH" != "/home/peterdsp/magnetio" ]; then
            echo "Unexpected DEPLOY_PATH: $DEPLOY_PATH"
            exit 1
          fi

          mkdir -p "$DEPLOY_PATH"

          rsync -az --delete \
            --filter='P .env' \
            --filter='P addon/.env' \
            --filter='P scraper/.env' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'addon/node_modules/' \
            --exclude 'scraper/node_modules/' \
            --exclude '.DS_Store' \
            ./ "$DEPLOY_PATH/"

      - name: Deploy with Docker Compose
        env:
          DEPLOY_PATH: /home/peterdsp/magnetio
        run: |
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example. Update it on the server before exposing the addon publicly."
          fi

          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Health check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTHCHECK_URL:-}" ]; then
            echo "HEALTHCHECK_URL not set; skipping."
            exit 0
          fi

          curl --fail --retry 12 --retry-delay 5 --retry-connrefused "$HEALTHCHECK_URL"
