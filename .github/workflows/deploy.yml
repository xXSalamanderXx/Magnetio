name: Validate And Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            addon/package-lock.json
            scraper/package-lock.json

      - name: Install addon dependencies
        working-directory: addon
        run: npm ci

      - name: Test addon
        working-directory: addon
        run: npm test

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

  deploy:
    name: deploy
    needs: validate
    if: >-
      github.actor == 'peterdsp' &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: [self-hosted, raspberry-pi, production]
    environment: production
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify production runner
        run: |
          set -euo pipefail

          test "${RUNNER_ENVIRONMENT:-}" = "self-hosted"
          command -v rsync
          docker compose version

      - name: Sync repository to local deploy path
        env:
          DEPLOY_PATH: /home/peterdsp/magnetio
        run: |
          set -euo pipefail

          if [ "$DEPLOY_PATH" != "/home/peterdsp/magnetio" ]; then
            echo "Unexpected DEPLOY_PATH: $DEPLOY_PATH"
            exit 1
          fi

          mkdir -p "$DEPLOY_PATH"

          rsync -az --delete \
            --filter='P .env' \
            --filter='P addon/.env' \
            --filter='P scraper/.env' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'addon/node_modules/' \
            --exclude 'scraper/node_modules/' \
            --exclude '.DS_Store' \
            ./ "$DEPLOY_PATH/"

      - name: Deploy with Docker Compose
        env:
          DEPLOY_PATH: /home/peterdsp/magnetio
        run: |
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example. Update it on the server before exposing the addon publicly."
          fi

          echo "--- Containers publishing port 7000 (before) ---"
          docker ps -a --filter "publish=7000" --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true

          docker compose stop addon 2>/dev/null || true
          docker compose rm -f addon 2>/dev/null || true

          # Force-remove any container still publishing port 7000, regardless of name.
          mapfile -t port_holders < <(docker ps -a --filter "publish=7000" --format '{{.ID}}')
          if [ "${#port_holders[@]}" -gt 0 ]; then
            echo "Force-removing containers holding port 7000: ${port_holders[*]}"
            docker rm -f "${port_holders[@]}" 2>/dev/null || true
          fi

          # As a last resort, free port 7000 from any non-Docker process.
          if command -v ss >/dev/null 2>&1 && ss -ltnp 2>/dev/null | grep -q ':7000 '; then
            echo "--- Listeners on port 7000 (after container cleanup) ---"
            ss -ltnp 2>/dev/null | grep ':7000 ' || true
            mapfile -t pids < <(ss -ltnp 2>/dev/null | grep ':7000 ' | grep -oE 'pid=[0-9]+' | cut -d= -f2 | sort -u)
            for pid in "${pids[@]}"; do
              [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
            done
            sleep 2
            for pid in "${pids[@]}"; do
              [ -n "$pid" ] && kill -9 "$pid" 2>/dev/null || true
            done
          fi

          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: Health check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTHCHECK_URL:-}" ]; then
            echo "HEALTHCHECK_URL not set; skipping."
            exit 0
          fi

          curl --fail --retry 12 --retry-delay 5 --retry-connrefused "$HEALTHCHECK_URL"
